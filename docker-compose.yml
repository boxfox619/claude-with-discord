services:
  bot:
    build: .
    container_name: claude-discord
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      # Config (read-only, hot-reload supported)
      - ./config.json:/app/config.json:ro
      # Home directory persistence (auth, git config, ssh keys, etc.)
      - user-home:/root
      - ./claude-config.json:/root/.claude.json
      # Project directories
      - ./:/app/projects/claude-with-discord
      - ./projects/bake-frontend:/app/projects/bake-frontend
      - ./projects/bake-backend:/app/projects/bake-backend
      - ./projects/BitBake-App:/app/projects/BitBake-App
    deploy:
      resources:
        limits:
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  user-home:
